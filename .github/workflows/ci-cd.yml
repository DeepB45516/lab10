# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — Student Task Manager
# Covers: Lab 1 (Git), Lab 2 (Build), Lab 3 (GitHub Actions + Jest),
#         Lab 4 (Docker), Lab 5 (Docker Hub Push), Lab 6 (Netlify Deploy),
#         Lab 8 (SonarQube), Lab 9 (GitHub Secrets)
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

# ── Trigger: runs on every push and pull request to main ──────────────────────
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: TEST
# Lab 3 — GitHub Actions Workflow for Automated Testing & Build
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      # Lab 1 — Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Set up Node.js environment
      - name: Setup Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      # Lab 2 — Install dependencies (build step)
      - name: Install Dependencies
        run: npm install

      # Lab 3 — Run Jest tests with coverage
      - name: Run Jest Tests
        run: npm test

      # Lab 3 — Build step
      - name: Build
        run: npm run build

      # Save coverage report for SonarQube (Lab 8)
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage/

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2: CODE QUALITY
# Lab 8 — SonarQube Static Code Analysis
# Lab 9 — SONAR_TOKEN stored as GitHub Secret
# ─────────────────────────────────────────────────────────────────────────────
  sonarqube:
    name: 🔍 Code Quality (SonarQube)
    runs-on: ubuntu-latest
    needs: test        # Only runs if tests pass

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0     # Full history needed for SonarQube blame info

      - name: Setup Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Generate Coverage Report
        run: npm test

      # Lab 8 + Lab 9 — SonarQube scan using SONAR_TOKEN secret
      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}     # Auto-provided by GitHub
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}       # Lab 9 — Stored as GitHub Secret

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3: DOCKER BUILD & PUSH
# Lab 4 — Dockerfile and Docker build
# Lab 5 — Docker CI Integration and Docker Hub Push
# Lab 9 — DOCKERHUB_USERNAME and DOCKERHUB_TOKEN as GitHub Secrets
# ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: test        # Only runs if tests pass

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Lab 4 — Build Docker image locally
      - name: Build Docker Image
        run: |
          docker build -t student-task-manager:latest .
          docker images

      # Lab 9 — Login using GitHub Secrets (DOCKERHUB_USERNAME, DOCKERHUB_TOKEN)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Lab 5 — Set up Docker Buildx for multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Lab 5 — Build and push image to Docker Hub
      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/student-task-manager:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/student-task-manager:${{ github.sha }}

      # Verify the pushed image
      - name: Verify Docker Image on Hub
        run: |
          echo "✅ Image pushed: ${{ secrets.DOCKERHUB_USERNAME }}/student-task-manager:latest"
          echo "✅ SHA tag:      ${{ secrets.DOCKERHUB_USERNAME }}/student-task-manager:${{ github.sha }}"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4: DEPLOY TO NETLIFY
# Lab 6 — Deploy Static Web App to Netlify via CI/CD
# Lab 9 — NETLIFY_AUTH_TOKEN and NETLIFY_SITE_ID as GitHub Secrets
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Netlify
    runs-on: ubuntu-latest
    needs: [ test, docker ]    # Only deploy after tests AND docker pass

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Lab 6 + Lab 9 — Deploy using Netlify secrets
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2
        with:
          publish-dir: './public'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions — ${{ github.sha }}"
          enable-pull-request-comment: true
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Deployment Success
        run: echo "✅ App deployed to Netlify successfully!"
