# SonarQube Project Configuration
# Lab 8 - Static Code Analysis

sonar.projectKey=student-task-manager
sonar.projectName=Student Task Manager
sonar.projectVersion=1.0

# Source directory
sonar.sources=src
sonar.tests=tests

# Language
sonar.language=js
sonar.sourceEncoding=UTF-8

# Coverage report path (generated by Jest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=node_modules/**,coverage/**,public/**
